<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05050a" />
      <stop offset="50%" stop-color="#0f0c1b" />
      <stop offset="100%" stop-color="#05050a" />
    </linearGradient>

    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>

    <!-- Text Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Futuristic Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1d1b3a" stroke-width="1" stroke-opacity="0.3" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Neon Glowing Lines / Tech Accent Elements -->
  <path d="M-100,100 L300,100 L350,150 L1300,150" fill="none" stroke="#00f2fe" stroke-width="2" stroke-opacity="0.2" />
  <path d="M-100,300 L850,300 L900,250 L1300,250" fill="none" stroke="#7f00ff" stroke-width="2" stroke-opacity="0.2" />

  <!-- Decorative Circle Nodes -->
  <circle cx="350" cy="150" r="4" fill="#00f2fe" opacity="0.6" />
  <circle cx="900" cy="250" r="4" fill="#7f00ff" opacity="0.6" />

  <!-- Main Title -->
  <text x="600" y="180" font-family="'Segoe UI', -apple-system, Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="64" fill="#ffffff" text-anchor="middle" letter-spacing="2" filter="url(#glow)">
    AWESOME ESPORTS
  </text>
  
  <text x="600" y="250" font-family="'Segoe UI', -apple-system, Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="54" fill="url(#accentGrad)" text-anchor="middle" letter-spacing="4" filter="url(#glow)">
    AI AGENTS
  </text>

  <!-- Subtitle -->
  <text x="600" y="310" font-family="'Segoe UI', -apple-system, Roboto, Helvetica, Arial, sans-serif" font-weight="400" font-size="18" fill="#a0aec0" text-anchor="middle" letter-spacing="1">
    🎮 Curated List of SaaS Platforms &amp; Open-Source Projects for Competitive Gaming 🎮
  </text>

  <!-- Bottom Accent Bar -->
  <rect x="500" y="340" width="200" height="4" rx="2" fill="url(#accentGrad)" />
</svg>
